# routing-engine.yaml

routing_order:
  - local_offline
  - cache
  - lowest_cost_capable
  - complexity_escalation
  - defer

complexity_table:
  L0:
    primary: wizard.mistral
    secondary: wizard.openrouter
    premium: wizard.openai
  L1:
    primary: wizard.mistral
    secondary: wizard.openrouter
    premium: wizard.openai
  L2:
    primary: wizard.openrouter
    secondary: wizard.openai
    premium: wizard.anthropic
  L3:
    primary: wizard.openai
    secondary: wizard.anthropic
    premium: wizard.gemini
  L4:
    primary: wizard.anthropic
    secondary: wizard.gemini
    premium: wizard.openai

request_classes:
  - summarize
  - draft
  - classify
  - analysis
  - research
  - code
  - multimodal
  - transformation

defer_conditions:
  - no_capable_provider
  - budget_blocked
  - approval_missing
  - schedule_blocked
